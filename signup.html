<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNDEDPRO | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#050505] text-white">

    <div class="w-full max-w-sm p-8 bg-[#0a0a0a] border border-zinc-800 rounded-3xl text-center">
        <h1 class="text-3xl font-black mb-8">CREATE ACCOUNT</h1>
        
        <form class="space-y-4 text-left">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-zinc-500 font-bold ml-1">First Name</label>
                    <input type="text" class="w-full p-3 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl outline-none focus:border-[#8BFF00]">
                </div>
                <div>
                    <label class="text-xs text-zinc-500 font-bold ml-1">Last Name</label>
                    <input type="text" class="w-full p-3 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl outline-none focus:border-[#8BFF00]">
                </div>
            </div>
            <div>
                <label class="text-xs text-zinc-500 font-bold ml-1">Email</label>
                <input type="email" class="w-full p-3 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl outline-none focus:border-[#8BFF00]">
            </div>
            <div>
                <label class="text-xs text-zinc-500 font-bold ml-1">Password</label>
                <input type="password" class="w-full p-3 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl outline-none focus:border-[#8BFF00]">
            </div>
            <button class="w-full bg-[#8BFF00] text-black py-4 rounded-xl font-black mt-6">Sign up today</button>
        </form>
        
        <p class="text-center text-zinc-500 mt-6 text-sm">Already have an account? <a href="login.html" class="text-[#8BFF00] font-bold">Sign in</a></p>
    </div>

</body>
</html>
