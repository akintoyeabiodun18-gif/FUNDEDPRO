<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FUNDEDPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, .03); backdrop-filter: blur(18px); border: 1px solid rgba(255, 255, 255, .08); }
        .green { color: #8BFF00; }
        .green-bg { background: #8BFF00; color: black; font-weight: 900; }
        input, select { background: #0a0a0a !important; color: white !important; }
    </style>
</head>
<body class="py-12">

<div class="max-w-6xl mx-auto px-5">
    <div class="grid lg:grid-cols-2 gap-8">
        <div class="space-y-8">
            <div class="glass rounded-[35px] p-8">
                <h2 class="text-3xl font-black mb-6">Your Order</h2>
                <div id="summaryDisplay" class="space-y-2">
                    <p class="text-lg text-zinc-400">Plan: <span id="summModel" class="font-bold text-white">1 Step</span></p>
                    <p class="text-lg text-zinc-400">Size: <span id="summSize" class="font-bold text-white">100K</span></p>
                    <p class="text-lg text-zinc-400">Platform: <span id="summPlatform" class="font-bold text-white">TradeLocker</span></p>
                    <h2 id="totalPrice" class="text-5xl font-black green pt-4">$350.00</h2>
                </div>
            </div>

            <div class="glass rounded-[35px] p-8">
                <h3 class="text-xl font-bold mb-4">Add-ons</h3>
                <label class="flex items-center gap-4 p-4 bg-zinc-900 rounded-xl border border-zinc-800 cursor-pointer">
                    <input id="splitAddon" type="checkbox" onchange="calculate()" class="w-5 h-5 accent-[#8BFF00]">
                    <span>100% Profit Split (+20%)</span>
                </label>
            </div>
        </div>

        <div class="glass rounded-[35px] p-8">
            <h3 class="text-2xl font-bold mb-6">Billing Details</h3>
            <form id="checkoutForm" onsubmit="handleSubmit(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="firstName" required placeholder="First name *" class="w-full p-4 border border-zinc-800 rounded-xl">
                    <input type="text" name="lastName" required placeholder="Last name *" class="w-full p-4 border border-zinc-800 rounded-xl">
                </div>
                <select id="countrySelect" name="country" required class="w-full p-4 border border-zinc-800 rounded-xl">
                    <option value="" disabled selected>Select a Country / Region *</option>
                </select>
                <input type="text" name="address" placeholder="Apartment, suite, unit, etc. (optional)" class="w-full p-4 border border-zinc-800 rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="postcode" required placeholder="Postcode / ZIP *" class="w-full p-4 border border-zinc-800 rounded-xl">
                    <input type="text" name="city" required placeholder="Town / City *" class="w-full p-4 border border-zinc-800 rounded-xl">
                </div>
                <input type="tel" name="phone" placeholder="Phone (optional)" class="w-full p-4 border border-zinc-800 rounded-xl">
                <input type="email" name="email" required placeholder="Email address *" class="w-full p-4 border border-zinc-800 rounded-xl">
                
                <button type="submit" class="w-full green-bg py-4 rounded-xl mt-6 font-black text-lg hover:opacity-90 transition">PLACE ORDER</button>
            </form>
        </div>
    </div>
</div>

<script>
const state = { model: "1 Step", size: "100K", platform: "TradeLocker" };

const pricingData = {
    "1 Step": { "5K": 49, "15K": 99, "25K": 149, "50K": 199, "100K": 350, "200K": 599 },
    "2 Step": { "5K": 39, "15K": 89, "25K": 128, "50K": 180, "100K": 299, "200K": 555 },
    "3 Step": { "5K": 35, "15K": 79, "25K": 110, "50K": 150, "100K": 250, "200K": 499 },
    "Instant": { "5K": 80, "15K": 150, "25K": 250, "50K": 450, "100K": 850, "200K": 1600 }
};

window.onload = () => {
    populateCountries();
    const params = new URLSearchParams(window.location.search);
    if(params.has("model")) state.model = params.get("model");
    if(params.has("size")) state.size = params.get("size");
    if(params.has("platform")) state.platform = params.get("platform");

    document.getElementById("summModel").innerText = state.model;
    document.getElementById("summSize").innerText = state.size;
    document.getElementById("summPlatform").innerText = state.platform;
    calculate();
};

function calculate() {
    let price = pricingData[state.model][state.size] || 350;
    if(document.getElementById("splitAddon").checked) price *= 1.20;
    document.getElementById("totalPrice").innerText = "$" + price.toFixed(2);
}

function populateCountries() {
    const select = document.getElementById("countrySelect");
    const countries = [
        "Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan",
        "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso", "Burundi",
        "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic", "Chad", "Chile", "China", "Colombia", "Comoros", "Congo", "Costa Rica", "Croatia", "Cuba", "Cyprus", "Czech Republic",
        "Denmark", "Djibouti", "Dominica", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia",
        "Fiji", "Finland", "France", "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau", "Guyana",
        "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel", "Italy", "Ivory Coast",
        "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg",
        "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania", "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar",
        "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger", "North Korea", "North Macedonia", "Norway", "Oman",
        "Pakistan", "Palau", "Palestine", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland", "Portugal", "Qatar", "Romania", "Russia", "Rwanda",
        "Saint Kitts and Nevis", "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Sao Tome and Principe", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands", "Somalia", "South Africa", "South Korea", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria",
        "Taiwan", "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Tuvalu",
        "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam", "Yemen", "Zambia", "Zimbabwe"
    ];

    countries.forEach(country => {
        const opt = document.createElement("option");
        opt.value = country;
        opt.textContent = country;
        select.appendChild(opt);
    });
}

async function handleSubmit(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const orderData = {
        model: state.model,
        size: state.size,
        platform: state.platform,
        price: document.getElementById("totalPrice").innerText.replace('$', ''),
        billing: Object.fromEntries(formData.entries()) // Now this will capture all inputs with 'name' attributes
    };

    try {
        const response = await fetch('/api/create-invoice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
        });
        const data = await response.json();
        if (data.invoice_url) {
            window.location.href = data.invoice_url;
        } else {
            alert("Error: " + (data.error || "Could not create invoice."));
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Payment gateway connection failed.");
    }
}
</script>
</body>
</html>
