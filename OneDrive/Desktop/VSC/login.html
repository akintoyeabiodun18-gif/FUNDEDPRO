<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNDEDPRO | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#050505; color:white; font-family:'Inter',sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#050505]">

    <div class="w-full max-w-sm p-8 bg-[#0a0a0a] border border-zinc-800 rounded-3xl text-center">
        <div class="mb-6 flex flex-col items-center">
            <div class="w-16 h-16 border-2 border-white rounded-2xl flex items-center justify-center mb-4">
                <span class="text-white font-black text-2xl italic">FP</span>
            </div>
            <h2 class="text-white font-black text-sm tracking-[0.2em]">FUNDED<span class="text-[#8BFF00]">PRO</span></h2>
        </div>

        <h1 class="text-4xl font-black mb-8 text-white">WELCOME</h1>
        
        <form class="space-y-4 text-left">
            <div>
                <label class="text-xs text-zinc-500 font-bold ml-1">Email</label>
                <input type="email" class="w-full p-3 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl text-white outline-none focus:border-[#8BFF00]">
            </div>
            <div>
                <label class="text-xs text-zinc-500 font-bold ml-1">Password</label>
                <input type="password" class="w-full p-3 mt-1 bg-zinc-900 border border-zinc-800 rounded-xl text-white outline-none focus:border-[#8BFF00]">
            </div>
            <button class="w-full bg-[#8BFF00] text-black py-4 rounded-xl font-black mt-6 hover:opacity-90 transition">Login</button>
        </form>
        
        <p class="text-center text-zinc-500 mt-6 text-sm">Don't have an account? <a href="signup.html" class="text-[#8BFF00] font-bold">Create one</a>
</body>
</body>
</html>
